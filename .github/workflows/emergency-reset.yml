name: Emergency Process Reset

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Kill all stale Node processes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          request_pty: true
          script: |
            echo "🔍 Current Node processes:"
            ps aux | grep node | grep -v grep || echo "None found"

            echo "💀 Killing all Node processes for this app..."
            pkill -9 -f "sridhar_jeweller_api/dist/server.js" || echo "No matching processes"

            echo "⏳ Waiting 5 seconds..."
            sleep 5

            echo "🚀 Starting fresh app instance..."
            PID_FILE="/home/moiaccou/sridhar_jeweller_api/app.pid"
            WRAPPER="/home/moiaccou/nodevenv/sridhar_jeweller_api/20/bin/node"
            APP="/home/moiaccou/sridhar_jeweller_api/dist/server.js"
            LOG="/home/moiaccou/sridhar_jeweller_api/app.log"

            nohup "$WRAPPER" "$APP" > "$LOG" 2>&1 &
            echo $! > "$PID_FILE"
            echo "✅ App started with PID $(cat $PID_FILE)"

            sleep 10
            echo "📋 app.log:"
            tail -20 "$LOG"