name: High-Level CI/CD Pipeline

on:
  push:
    branches:
      - main      # Triggers Production deployment
      - staging   # Triggers Staging deployment
  pull_request:
    branches:
      - main
      - staging

env:
  NODE_VERSION: '20'

jobs:
  # ==========================================
  # 1. CI: Lint, Test, and Build Validation
  # ==========================================
  ci:
    name: CI Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter (Optional)
        run: npm run lint --if-present

      - name: Run Tests (Optional)
        run: npm test --if-present

      - name: Build Application
        run: npm run build

      - name: Verify Build Output
        run: test -f dist/server.js || exit 1

  # ==========================================
  # 2. CD: Deploy to Staging or Production
  # ==========================================
  cd:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    needs: ci
    if: github.event_name == 'push' 
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install All Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Prune Dev Dependencies
        run: npm prune --omit=dev

      - name: Determine Deployment Paths
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "DEPLOY_PATH=/home/moiaccou/sridhar_jeweller_api" >> $GITHUB_ENV
            echo "BACKUP_PREFIX=prod_backup" >> $GITHUB_ENV
            echo "APP_DOMAIN=sridhar.moiaccount.in" >> $GITHUB_ENV
          else
            echo "DEPLOY_PATH=/home/moiaccou/staging_sridhar_jeweller_api" >> $GITHUB_ENV
            echo "BACKUP_PREFIX=stg_backup" >> $GITHUB_ENV
            echo "APP_DOMAIN=staging.sridhar.moiaccount.in" >> $GITHUB_ENV 
          fi

      - name: Backup Current Deployment (Safety Net)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            BACKUP_DIR="${{ env.DEPLOY_PATH }}_${{ env.BACKUP_PREFIX }}_latest"
            echo "📦 Creating full backup at $BACKUP_DIR..."
            rm -rf "$BACKUP_DIR"
            if [ -d "${{ env.DEPLOY_PATH }}/dist" ]; then
              cp -a ${{ env.DEPLOY_PATH }} "$BACKUP_DIR"
              echo "✅ Backup created successfully."
            else
              echo "⚠️ No existing 'dist' folder found. Skipping backup."
            fi

      - name: Setup SSH Agent for Rsync
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy Artifacts via Rsync
        run: |
          rsync -avz --delete --exclude='.git' --exclude='.env' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ env.DEPLOY_PATH }}/

      # =====================================================================
      # FIX: Replaced dangerous pkill and broken uapi with safe alternatives
      # =====================================================================
      - name: Force Restart Node Service & Verify Health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            echo "🚀 Deployment files synced successfully."
            
            cd ${{ env.DEPLOY_PATH }}
            APP_NAME=$(basename ${{ env.DEPLOY_PATH }})
            
            # Activate Node environment if using cPanel Node.js app
            if [ -f /home/moiaccou/nodevenv/$APP_NAME/20/bin/activate ]; then
              source /home/moiaccou/nodevenv/$APP_NAME/20/bin/activate
            fi

            echo "=========================================="
            echo "♻️ EXECUTING SERVICE RESTART"
            echo "=========================================="

            # LAYER 1: Standard Passenger Restart File
            echo "1️⃣ Updating Passenger restart.txt..."
            mkdir -p tmp
            chmod 755 tmp
            date +%s > tmp/restart.txt
            touch -m tmp/restart.txt

            # LAYER 2: Passenger CLI Restart (Official method)
            echo "2️⃣ Attempting passenger-config restart..."
            passenger-config restart-app ${{ env.DEPLOY_PATH }} || echo "passenger-config not found, relying on Layer 3."

            # LAYER 3: Safely kill cached Node processes
            echo "3️⃣ Killing cached Node processes (Fallback)..."
            # FIX: We use /proc/*/cwd to find processes running in the app directory.
            # This is MUCH safer than pkill -f, which was accidentally killing the SSH session!
            PIDS=$(ls -l /proc/*/cwd 2>/dev/null | grep "${{ env.DEPLOY_PATH }}" | awk -F'/' '{print $3}' || true)
            if [ -n "$PIDS" ]; then
              echo "Found cached processes: $PIDS. Killing them..."
              kill -9 $PIDS || true
            else
              echo "No cached processes found."
            fi
            
            echo "⏳ Waiting 15 seconds for application to fully boot..."
            sleep 15

            echo "=========================================="
            echo "🔍 RUNNING LOCALIZED HEALTH CHECK"
            echo "=========================================="
            MAX_ATTEMPTS=5
            ATTEMPT=1
            HEALTH_OK=false
            
            while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
              STATUS=$(curl -s --max-time 10 --resolve ${{ env.APP_DOMAIN }}:443:127.0.0.1 -o /dev/null -w "%{http_code}" https://${{ env.APP_DOMAIN }}/api || echo "000")
              
              if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
                echo "✅ Health check passed! (HTTP $STATUS)"
                HEALTH_OK=true
                break
              fi
              
              echo "Attempt $ATTEMPT/$MAX_ATTEMPTS failed (HTTP $STATUS). Retrying in 10s..."
              sleep 10
              ATTEMPT=$((ATTEMPT + 1))
            done

            # ==========================================
            # AUTOMATED ROLLBACK MECHANISM
            # ==========================================
            if [ "$HEALTH_OK" = false ]; then
              echo "❌ Health check failed after $MAX_ATTEMPTS attempts. Initiating ROLLBACK..."
              
              BACKUP_DIR="${{ env.DEPLOY_PATH }}_${{ env.BACKUP_PREFIX }}_latest"
              
              if [ -d "$BACKUP_DIR" ]; then
                echo "Restoring from $BACKUP_DIR..."
                rsync -a --delete "$BACKUP_DIR"/ ${{ env.DEPLOY_PATH }}/
                rm -rf "$BACKUP_DIR"
                
                echo "Restarting services after rollback..."
                date +%s > tmp/restart.txt
                touch -m tmp/restart.txt
                
                # Safely kill processes again using the /proc trick
                PIDS=$(ls -l /proc/*/cwd 2>/dev/null | grep "${{ env.DEPLOY_PATH }}" | awk -F'/' '{print $3}' || true)
                if [ -n "$PIDS" ]; then
                  kill -9 $PIDS || true
                fi
                sleep 10
              else
                echo "⚠️ No backup found to restore!"
              fi
              
              exit 1
            fi
            
            # Cleanup any old timestamped backups from previous pipeline runs
            ls -td ${{ env.DEPLOY_PATH }}_${{ env.BACKUP_PREFIX }}_[0-9]* 2>/dev/null | xargs -r rm -rf
            
            echo "🎉 Deployment to ${{ github.ref_name }} completed successfully!"