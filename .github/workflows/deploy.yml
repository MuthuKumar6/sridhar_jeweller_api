name: Deploy Backend to cPanel (Production)
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          timeout: 300s
          script: |
            set -e
            echo "=================================="
            echo "🚀 DEPLOYMENT STARTED"
            echo "=================================="
            date

            cd /home/moiaccou/sridhar_jeweller_api

            echo "📥 Updating source code..."
            git fetch origin
            git reset --hard origin/main

            echo "📌 Current Commit:"
            git rev-parse HEAD
            git log --oneline -1

            echo "⚙️ Activating Node Environment..."
            source /home/moiaccou/nodevenv/sridhar_jeweller_api/20/bin/activate

            echo "🧹 Cleaning previous build..."
            rm -rf dist
            rm -rf node_modules

            echo "📦 Installing dependencies..."
            npm ci || npm install

            echo "🔨 Building TypeScript..."
            npm run build

            echo "✅ Build completed"
            echo "Build Time: $(date)" > dist/build-version.txt
            echo "Commit: $(git rev-parse HEAD)" >> dist/build-version.txt

            echo "📂 Build output:"
            ls -la dist/

            echo "🔍 Verifying server file..."
            test -f dist/server.js && echo "server.js EXISTS ✅" || (echo "server.js MISSING ❌" && exit 1)

            echo "♻️ Restarting app via cPanel UAPI..."
            curl -s -u "$USERNAME:$CPANEL_TOKEN" \
              "https://$HOST:2083/execute/NodeJS/restart_app?app_name=sridhar_jeweller_api" \
              | grep -q '"status":1' && echo "App restarted via UAPI ✅" || echo "UAPI restart failed, falling back..."

            # Fallback: kill node process so Passenger cold-starts fresh
            pkill -f "sridhar_jeweller_api" || true
            sleep 2

            # Also update restart.txt
            mkdir -p tmp
            date +%s > tmp/restart.txt

            echo "=================================="
            echo "🎉 DEPLOYMENT SUCCESSFUL"
            echo "=================================="
            date

      - name: Verify Deployment
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://sridhar.moiaccount.in/api)
          echo "API Response Code: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "✅ API is responding"
          else
            echo "❌ API may be down (status: $STATUS)"
            exit 1
          fi