name: Deploy Backend to cPanel (Production)
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          timeout: 300s
          envs: CPANEL_TOKEN,CPANEL_USER,CPANEL_HOST   # ✅ inject into SSH session
          script: |
            set -e
            echo "=================================="
            echo "🚀 DEPLOYMENT STARTED"
            echo "=================================="
            date

            cd /home/moiaccou/sridhar_jeweller_api

            echo "📥 Updating source code..."
            git fetch origin
            git reset --hard origin/main

            echo "📌 Current Commit:"
            git rev-parse HEAD
            git log --oneline -1

            echo "⚙️ Activating Node Environment..."
            source /home/moiaccou/nodevenv/sridhar_jeweller_api/20/bin/activate

            echo "🧹 Cleaning previous build..."
            rm -rf dist
            rm -rf node_modules

            echo "📦 Installing dependencies..."
            npm ci || npm install

            echo "🔨 Building TypeScript..."
            npm run build

            echo "✅ Build completed"
            echo "Build Time: $(date)" > dist/build-version.txt
            echo "Commit: $(git rev-parse HEAD)" >> dist/build-version.txt

            echo "📂 Build output:"
            ls -la dist/

            echo "🔍 Verifying server file..."
            test -f dist/server.js && echo "server.js EXISTS ✅" || (echo "server.js MISSING ❌" && exit 1)

            echo "♻️ Restarting app via cPanel UAPI..."
            RESTART=$(curl -s -u "$CPANEL_USER:$CPANEL_TOKEN" \
              "https://$CPANEL_HOST:2083/execute/NodeJS/restart_app?app_name=sridhar_jeweller_api")
            echo "UAPI Response: $RESTART"
            echo "$RESTART" | grep -q '"status":1' \
              && echo "App restarted via UAPI ✅" \
              || echo "⚠️ UAPI restart uncertain, applying fallback..."

            # Fallback: force kill so Passenger cold-starts fresh
            pkill -f "sridhar_jeweller_api" || true

            mkdir -p tmp
            date +%s > tmp/restart.txt

            echo "⏳ Waiting for Passenger to boot..."
            sleep 15

            echo "=================================="
            echo "🎉 DEPLOYMENT SUCCESSFUL"
            echo "=================================="
            date
        env:
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_HOST: ${{ secrets.HOST }}          # ✅ reusing HOST — no new secret needed

      - name: Verify Deployment
        run: |
          echo "⏳ Waiting for app to fully boot..."
          sleep 20

          max_attempts=5
          attempt=1

          while [ $attempt -le $max_attempts ]; do
            STATUS=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" \
              https://sridhar.moiaccount.in/api || echo "000")
            echo "Attempt $attempt/$max_attempts → HTTP $STATUS"

            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "✅ API is live!"
              exit 0
            fi

            echo "Not ready, retrying in 10s..."
            sleep 10
            attempt=$((attempt + 1))
          done

          echo "❌ API did not respond after $max_attempts attempts"
          exit 1