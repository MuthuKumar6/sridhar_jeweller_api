name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: moiaccount.in
          username: moiaccou
          key: ${{ secrets.SSH_KEY }}
          port: 22

          script: |
            whoami
            pwd