name: High-Level CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

env:
  NODE_VERSION: '20'

jobs:
  # ==========================================
  # 1. CI: Lint, Test, and Build Validation
  # ==========================================
  ci:
    name: CI Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read  # only needs to read the repo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter (Optional)
        run: npm run lint --if-present

      - name: Run Tests (Optional)
        run: npm test --if-present

      - name: Build Application
        run: npm run build

      - name: Verify Build Output
        run: test -f dist/server.js || exit 1

  # ==========================================
  # 2. CD: Deploy to Staging or Production
  # ==========================================
  cd:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read  # only needs to read the repo
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install All Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Prune Dev Dependencies
        run: npm prune --omit=dev

      - name: Determine Deployment Paths
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "DEPLOY_PATH=/home/moiaccou/sridhar_jeweller_api" >> $GITHUB_ENV
            echo "BACKUP_PREFIX=prod_backup" >> $GITHUB_ENV
            echo "APP_DOMAIN=sridhar.moiaccount.in" >> $GITHUB_ENV
            echo "APP_PORT=5000" >> $GITHUB_ENV
          else
            echo "DEPLOY_PATH=/home/moiaccou/staging_sridhar_jeweller_api" >> $GITHUB_ENV
            echo "BACKUP_PREFIX=stg_backup" >> $GITHUB_ENV
            echo "APP_DOMAIN=staging.sridhar.moiaccount.in" >> $GITHUB_ENV
            echo "APP_PORT=5000" >> $GITHUB_ENV
          fi

      - name: Backup Current Deployment (Safety Net)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            BACKUP_DIR="${{ env.DEPLOY_PATH }}_${{ env.BACKUP_PREFIX }}_latest"
            echo "📦 Creating full backup at $BACKUP_DIR..."
            rm -rf "$BACKUP_DIR"
            if [ -d "${{ env.DEPLOY_PATH }}/dist" ]; then
              cp -a ${{ env.DEPLOY_PATH }} "$BACKUP_DIR"
              echo "✅ Backup created successfully."
            else
              echo "⚠️ No existing 'dist' folder found. Skipping backup."
            fi

      - name: Deploy Artifacts via Rsync
        run: |
          KEY_FILE=$(mktemp)
          echo "${{ secrets.SSH_KEY }}" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          rsync -avz --delete --exclude='.git' --exclude='.env' \
            -e "ssh -o StrictHostKeyChecking=no -i $KEY_FILE" \
            ./ ${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ env.DEPLOY_PATH }}/

          rm -f "$KEY_FILE"

      - name: Force Restart Node Service & Verify Health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            echo "🚀 Deployment files synced successfully."

            cd ${{ env.DEPLOY_PATH }}
            APP_NAME=$(basename ${{ env.DEPLOY_PATH }})

            # Activate Node environment if using cPanel Node.js app
            ACTIVATE_SCRIPT="/home/moiaccou/nodevenv/$APP_NAME/20/bin/activate"
            if [ -f "$ACTIVATE_SCRIPT" ]; then
              source "$ACTIVATE_SCRIPT"
              echo "✅ Node environment activated."
            else
              echo "⚠️ No nodevenv activate script found at $ACTIVATE_SCRIPT"
              echo "Available nodevenv entries:"
              ls /home/moiaccou/nodevenv/ 2>/dev/null || echo "nodevenv directory not found"
            fi

            echo "=========================================="
            echo "♻️ EXECUTING SERVICE RESTART"
            echo "=========================================="

            # LAYER 1: Standard Passenger Restart File
            echo "1️⃣ Updating Passenger restart.txt..."
            mkdir -p tmp
            chmod 755 tmp
            date +%s > tmp/restart.txt
            touch -m tmp/restart.txt

            # LAYER 2: Passenger CLI Restart (Official method)
            echo "2️⃣ Attempting passenger-config restart..."
            passenger-config restart-app ${{ env.DEPLOY_PATH }} 2>/dev/null \
              || echo "passenger-config not found, relying on Layer 3."

            # LAYER 3: Safely kill only Node processes in the app directory
            echo "3️⃣ Killing cached Node processes (Fallback)..."
            CURRENT_PID=$$
            PIDS=""
            for pid_cwd in $(ls -l /proc/*/cwd 2>/dev/null \
                | grep "${{ env.DEPLOY_PATH }}" \
                | awk '{print $NF}' \
                | grep -oP '/proc/\K[0-9]+'); do
              if [ "$pid_cwd" = "$CURRENT_PID" ]; then
                continue
              fi
              EXE=$(readlink /proc/$pid_cwd/exe 2>/dev/null || true)
              if echo "$EXE" | grep -q "node"; then
                PIDS="$PIDS $pid_cwd"
              fi
            done

            if [ -n "$PIDS" ]; then
              echo "Found Node processes to kill:$PIDS"
              kill -9 $PIDS || true
              sleep 3
            else
              echo "No cached Node processes found."
            fi

            # LAYER 4: Explicitly start the app via cPanel's wrapper if available
            echo "4️⃣ Attempting explicit app start via cPanel wrapper..."
            CPANEL_WRAPPER="/home/moiaccou/nodevenv/$APP_NAME/20/bin/node"
            if [ -f "$CPANEL_WRAPPER" ]; then
              echo "Starting app with cPanel Node wrapper..."
              # Start detached so the SSH session doesn't hang
              nohup "$CPANEL_WRAPPER" ${{ env.DEPLOY_PATH }}/dist/server.js \
                > ${{ env.DEPLOY_PATH }}/app.log 2>&1 &
              echo "App started with PID $!"
            else
              echo "cPanel wrapper not found — relying on Passenger to pick up restart.txt on next request."
              echo "Sending a warm-up request to trigger Passenger boot..."
              curl -s --max-time 30 -o /dev/null \
                https://${{ env.APP_DOMAIN }}/api || true
            fi

            echo "⏳ Waiting 25 seconds for application to fully boot..."
            sleep 25

            echo "=========================================="
            echo "🔍 RUNNING LOCALIZED HEALTH CHECK"
            echo "=========================================="

            # Show what's actually listening
            echo "🔎 Listening ports:"
            ss -tlnp 2>/dev/null | grep -E "node|LISTEN" | head -20 \
              || netstat -tlnp 2>/dev/null | grep node \
              || echo "Could not list ports"

            # Show recent app log if it exists
            if [ -f ${{ env.DEPLOY_PATH }}/app.log ]; then
              echo "📋 Last 20 lines of app.log:"
              tail -20 ${{ env.DEPLOY_PATH }}/app.log
            fi

            MAX_ATTEMPTS=6
            ATTEMPT=1
            HEALTH_OK=false

            while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
              HTTP_STATUS=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" \
                http://127.0.0.1:${{ env.APP_PORT }}/ 2>/dev/null)
              STATUS="${HTTP_STATUS:-000}"

              if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
                echo "✅ Health check passed! (HTTP $STATUS)"
                HEALTH_OK=true
                break
              fi

              echo "Attempt $ATTEMPT/$MAX_ATTEMPTS failed (HTTP $STATUS). Retrying in 10s..."
              sleep 10
              ATTEMPT=$((ATTEMPT + 1))
            done

            # ==========================================
            # AUTOMATED ROLLBACK MECHANISM
            # ==========================================
            if [ "$HEALTH_OK" = false ]; then
              echo "❌ Health check failed after $MAX_ATTEMPTS attempts. Initiating ROLLBACK..."

              # Print final app log before rollback for debugging
              if [ -f ${{ env.DEPLOY_PATH }}/app.log ]; then
                echo "📋 app.log at time of failure:"
                tail -30 ${{ env.DEPLOY_PATH }}/app.log
              fi

              BACKUP_DIR="${{ env.DEPLOY_PATH }}_${{ env.BACKUP_PREFIX }}_latest"

              if [ -d "$BACKUP_DIR" ]; then
                echo "Restoring from $BACKUP_DIR..."
                rsync -a --delete "$BACKUP_DIR"/ ${{ env.DEPLOY_PATH }}/
                rm -rf "$BACKUP_DIR"

                echo "Restarting services after rollback..."
                date +%s > tmp/restart.txt
                touch -m tmp/restart.txt

                CURRENT_PID=$$
                PIDS=""
                for pid_cwd in $(ls -l /proc/*/cwd 2>/dev/null \
                    | grep "${{ env.DEPLOY_PATH }}" \
                    | awk '{print $NF}' \
                    | grep -oP '/proc/\K[0-9]+'); do
                  if [ "$pid_cwd" = "$CURRENT_PID" ]; then
                    continue
                  fi
                  EXE=$(readlink /proc/$pid_cwd/exe 2>/dev/null || true)
                  if echo "$EXE" | grep -q "node"; then
                    PIDS="$PIDS $pid_cwd"
                  fi
                done
                if [ -n "$PIDS" ]; then
                  kill -9 $PIDS || true
                fi
                sleep 10
              else
                echo "⚠️ No backup found to restore!"
              fi

              exit 1
            fi

            # Cleanup old timestamped backups
            ls -td ${{ env.DEPLOY_PATH }}_${{ env.BACKUP_PREFIX }}_[0-9]* 2>/dev/null \
              | xargs -r rm -rf

            echo "🎉 Deployment to ${{ github.ref_name }} completed successfully!"